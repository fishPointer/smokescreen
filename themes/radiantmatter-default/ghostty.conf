# smokescreen theme: radiantmatter
# Port of the radiantmatter.io background gradient (by Noah) — Three.js WebGL
# mesh gradient (Ashima simplex + fBm + domain warp, cool & warm color layers
# over near-black), adapted to render behind terminal text.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/radiantmatter.glsl
custom-shader-animation = true
