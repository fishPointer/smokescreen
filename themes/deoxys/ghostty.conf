# smokescreen theme: deoxys
# The DNA Pokémon: a rotating crystalline double-helix + pulsing psychic core
# with radial spikes, iridescent palette, and forme-morphing (Normal/Attack/
# Defense/Speed) with a chromatic-aberration mutation glitch at each change.
# CRT/VHS scanlines on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/deoxys.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
