# smokescreen theme: kyogre
# Primal Kyogre (Water) as a deep-sea abyss — the oceanic counterpart to groudon:
# a dark-blue depth gradient (abyss below, teal near the surface), shimmering water
# caustics (fwidth isolines of a drifting current), swaying god-ray light shafts,
# and drifting bioluminescent plankton (cyan, with rare warm-red Kyogre motes).
# Ergonomic (luminance ceiling) so caustics/rays stay readable. CRT on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/kyogre.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
