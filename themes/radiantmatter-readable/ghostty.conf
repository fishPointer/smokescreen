# smokescreen theme: radiantmatter-readable
# The radiantmatter.io gradient tuned for terminal legibility — bright cyan/pink
# peaks dimmed and highlight-capped so light text stays readable.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/radiantmatter-readable.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
