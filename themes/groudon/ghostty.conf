# smokescreen theme: groudon
# Primal Groudon (Ground/Fire) as tectonic plates of glowing rock: near-black
# basalt broken by a network of molten Voronoi cracks that flow orange->yellow->
# white-hot with a slow magma breathe, heat-haze shimmer, rising embers, and a low
# drought-sun warmth. Ergonomic (luminance ceiling) so hot seams stay readable.
# CRT/VHS scanlines on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/groudon.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
