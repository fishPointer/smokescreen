# smokescreen theme: pool-party
# Pastel vaporwave pool — pink/peach/aqua/lavender water with bright cyan-white
# caustic shimmer (isoline reflections), CRT/VHS scanlines on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/pool-party.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
