# smokescreen theme: distortion
# Giratina / Distortion-World — a dark warped void threaded with sparse, intense,
# glittering, fleeting amber-gold veins. CRT scanlines + vignette on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/distortion.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
