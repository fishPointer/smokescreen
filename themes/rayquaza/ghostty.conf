# smokescreen theme: rayquaza
# The sky serpent as calm, not spectacle: a slow emerald aurora over near-black,
# serpentine vertical curtains (anisotropic sampling), a whisper of ring-gold at
# the crest. Ergonomic for long sessions. CRT/VHS scanlines on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/rayquaza.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
