# smokescreen theme: jirachi
# The Wish Pokemon (Psychic/Steel) as calm dreaming sleep punctuated by a granted
# wish: a slow psychic nebula (indigo->teal wish-tag colours) over a near-black
# cosmic void, sparse gold/white stars, gold metallic flecks (steel sheen), and a
# rare Millennium Comet streak with a 5-point star head + gold tail. CRT on top.
#
# Install: copy this theme's shaders into ~/.config/ghostty/shaders/ and add
# these lines to ~/.config/ghostty/config (or include this file).

background-opacity = 0.0
background-blur = 24

custom-shader = shaders/jirachi.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
