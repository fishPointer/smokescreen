font-family = Berkeley Mono Nerd
font-size = 16
theme = IC Green PPL
minimum-contrast = 1.1
cursor-style = block
shell-integration-features = no-cursor,sudo,ssh-terminfo,ssh-env

# Copy plain text only — default is :mixed, which also writes a text/html
# flavor that rich editors (Obsidian/Electron) mangle on standard paste.
keybind = ctrl+shift+c=copy_to_clipboard:plain
keybind = copy=copy_to_clipboard:plain
keybind = ctrl+insert=copy_to_clipboard:plain

keybind = shift+enter=text:\x1b\r
keybind = ctrl+d=new_split:right
keybind = ctrl+shift+d=new_split:down
keybind = ctrl+shift+x=close_surface

# Transparency + blur (low opacity so the animated cloud shows through;
# the cloud shader paints the panel, blur frosts the desktop behind it)
background-opacity = 0.0
background-blur = 24
unfocused-split-opacity = 0.85
unfocused-split-fill = 1a2a4a
split-divider-color = 00bfff

# smokescreen theme: radiantmatter-readable (port of radiantmatter.io, with
# bright peaks dimmed/highlight-capped for terminal legibility) + CRT on top.
custom-shader = shaders/radiantmatter-readable.glsl
custom-shader = shaders/crt-bloom.glsl
custom-shader-animation = true
